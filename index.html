<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>fishstickvrr</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #64dc50;
    --green-dim: rgba(100,220,80,0.15);
    --green-border: rgba(100,220,80,0.3);
    --dark: #080b08;
    --card: rgba(255,255,255,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--green);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%,-50%);
    transition: transform 0.1s, background 0.2s;
    mix-blend-mode: screen;
  }
  #cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1.5px solid rgba(100,220,80,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%,-50%);
    transition: width 0.2s, height 0.2s, border-color 0.2s;
  }

  /* CANVAS BG */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* PARTICLE TRAIL */
  .trail-dot {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    pointer-events: none;
    z-index: 9997;
    transform: translate(-50%,-50%);
    animation: trailfade 0.6s forwards;
  }
  @keyframes trailfade {
    from { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
    to   { opacity: 0; transform: translate(-50%,-50%) scale(0); }
  }

  /* CLICK EXPLOSION */
  .explode {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%,-50%);
  }
  .explode-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--green);
    transform: translate(-50%,-50%);
    animation: explodering 0.5s forwards;
  }
  @keyframes explodering {
    from { width: 0; height: 0; opacity: 1; }
    to   { width: 80px; height: 80px; opacity: 0; }
  }
  .explode-particle {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    transform-origin: center;
    animation: explodeparticle 0.6s forwards;
  }
  @keyframes explodeparticle {
    from { opacity: 1; transform: translate(0,0) scale(1); }
    to   { opacity: 0; transform: var(--end-pos) scale(0); }
  }

  /* LAYOUT */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
  }

  /* CARD */
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 0.5px solid var(--green-border);
    border-radius: 24px;
    padding: 40px 32px 36px;
    backdrop-filter: blur(20px);
    animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(100,220,80,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* AVATAR */
  .avatar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }
  .avatar-container {
    position: relative;
    margin-bottom: 16px;
    cursor: none;
  }
  .avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), filter 0.3s;
    box-shadow: 0 0 0 3px rgba(100,220,80,0.4), 0 0 0 6px rgba(100,220,80,0.1), 0 0 30px rgba(100,220,80,0.15);
    animation: avatarpulse 3s ease-in-out infinite;
  }
  .avatar:hover {
    transform: scale(1.12) rotate(-3deg);
    filter: brightness(1.1) saturate(1.2);
  }
  @keyframes avatarpulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(100,220,80,0.4), 0 0 0 6px rgba(100,220,80,0.1), 0 0 30px rgba(100,220,80,0.15); }
    50%      { box-shadow: 0 0 0 3px rgba(100,220,80,0.6), 0 0 0 10px rgba(100,220,80,0.08), 0 0 50px rgba(100,220,80,0.25); }
  }
  .avatar-spin {
    animation: avatarspin 0.5s cubic-bezier(.34,1.56,.64,1) !important;
  }
  @keyframes avatarspin {
    0%   { transform: scale(1) rotate(0deg); }
    50%  { transform: scale(1.3) rotate(180deg); }
    100% { transform: scale(1) rotate(360deg); }
  }

  /* EGG POPUP */
  #egg-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    background: #0e1a0e;
    border: 1px solid var(--green-border);
    border-radius: 16px;
    padding: 24px 32px;
    z-index: 9999;
    text-align: center;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  #egg-popup.show {
    transform: translate(-50%,-50%) scale(1);
    pointer-events: all;
  }
  #egg-popup p {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    color: var(--green);
    font-weight: 800;
  }
  #egg-popup small {
    display: block;
    margin-top: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }

  /* USERNAME */
  .username {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #fff;
    letter-spacing: -0.5px;
    animation: fadeUp 0.8s 0.1s cubic-bezier(.22,1,.36,1) both;
  }

  .badge {
    display: inline-block;
    margin-top: 8px;
    background: var(--green-dim);
    border: 0.5px solid var(--green-border);
    color: var(--green);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    animation: fadeUp 0.8s 0.15s cubic-bezier(.22,1,.36,1) both;
  }

  .bio {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    font-style: italic;
    line-height: 1.7;
    animation: fadeUp 0.8s 0.2s cubic-bezier(.22,1,.36,1) both;
    min-height: 40px;
  }

  /* TYPING CURSOR */
  .type-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--green);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s steps(1) infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .divider {
    height: 0.5px;
    background: rgba(255,255,255,0.08);
    margin: 24px 0;
  }

  /* LINKS */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 18px;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
  }
  .link-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(100,220,80,0.06), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .link-btn:hover::after { transform: translateX(100%); }
  .link-btn:hover {
    background: rgba(100,220,80,0.07);
    border-color: rgba(100,220,80,0.3);
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 30px rgba(100,220,80,0.08);
  }
  .link-btn:active {
    transform: scale(0.97);
  }

  .icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  .link-btn:hover .icon { transform: scale(1.15) rotate(-5deg); }

  .icon-yt  { background: rgba(255,60,60,0.2); }
  .icon-tt  { background: rgba(255,255,255,0.07); }
  .icon-dc  { background: rgba(88,101,242,0.25); }

  .lbl { flex: 1; }
  .arr {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    transition: color 0.2s, transform 0.2s;
  }
  .link-btn:hover .arr {
    color: var(--green);
    transform: translate(2px,-2px);
  }

  /* MUSIC PLAYER */
  .music-bar {
    width: 100%;
    max-width: 400px;
    margin-top: 16px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.8s 0.5s cubic-bezier(.22,1,.36,1) both;
    cursor: none;
  }
  .music-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--green-dim);
    border: 0.5px solid var(--green-border);
    display: flex; align-items: center; justify-content: center;
    cursor: none;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
  }
  .music-btn:hover { background: rgba(100,220,80,0.25); transform: scale(1.1); }
  .music-btn svg { transition: transform 0.2s; }
  .music-info { flex: 1; overflow: hidden; }
  .music-title {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .music-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    margin-top: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 18px;
  }
  .bar {
    width: 3px;
    background: var(--green);
    border-radius: 2px;
    opacity: 0.4;
    animation: none;
    height: 4px;
    transition: opacity 0.3s;
  }
  .bars.playing .bar { opacity: 1; }
  .bars.playing .bar:nth-child(1) { animation: bar1 0.7s ease-in-out infinite alternate; }
  .bars.playing .bar:nth-child(2) { animation: bar2 0.5s ease-in-out infinite alternate; }
  .bars.playing .bar:nth-child(3) { animation: bar3 0.9s ease-in-out infinite alternate; }
  .bars.playing .bar:nth-child(4) { animation: bar1 0.6s ease-in-out infinite alternate; }
  .bars.playing .bar:nth-child(5) { animation: bar2 0.8s ease-in-out infinite alternate; }
  @keyframes bar1 { from{height:3px} to{height:16px} }
  @keyframes bar2 { from{height:6px} to{height:12px} }
  @keyframes bar3 { from{height:2px} to{height:18px} }

  /* VOLUME */
  .vol-wrap {
    display: flex; align-items: center; gap: 6px;
  }
  .vol-wrap svg { opacity: 0.4; flex-shrink: 0; }
  input[type=range].vol {
    -webkit-appearance: none;
    width: 60px; height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
    cursor: none;
  }
  input[type=range].vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    cursor: none;
  }

  /* FOOTER */
  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    animation: fadeUp 0.8s 0.6s cubic-bezier(.22,1,.36,1) both;
    z-index: 1;
    position: relative;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #0e1a0e;
    border: 0.5px solid var(--green-border);
    color: var(--green);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 99px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 9999;
    pointer-events: none;
    font-family: 'DM Sans', sans-serif;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

<script>
  // CURSOR
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });
  // Smooth ring follow
  function animRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animRing);
  }
  animRing();

  // CURSOR TRAIL
  let lastTrail = 0;
  document.addEventListener('mousemove', e => {
    const now = Date.now();
    if (now - lastTrail < 40) return;
    lastTrail = now;
    const dot = document.createElement('div');
    dot.className = 'trail-dot';
    dot.style.left = e.clientX + 'px';
    dot.style.top = e.clientY + 'px';
    dot.style.width = dot.style.height = (Math.random() * 4 + 3) + 'px';
    dot.style.opacity = Math.random() * 0.5 + 0.2;
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 600);
  });

  // CLICK EXPLOSION
  document.addEventListener('click', e => {
    const wrap = document.createElement('div');
    wrap.className = 'explode';
    wrap.style.left = e.clientX + 'px';
    wrap.style.top = e.clientY + 'px';
    const r = document.createElement('div');
    r.className = 'explode-ring';
    wrap.appendChild(r);
    const count = 8;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'explode-particle';
      const angle = (360 / count) * i;
      const dist = Math.random() * 40 + 20;
      const x = Math.cos(angle * Math.PI / 180) * dist;
      const y = Math.sin(angle * Math.PI / 180) * dist;
      p.style.setProperty('--end-pos', `translate(${x}px,${y}px) scale(0)`);
      p.style.left = '0px'; p.style.top = '0px';
      p.style.animationDelay = Math.random() * 0.1 + 's';
      wrap.appendChild(p);
    }
    document.body.appendChild(wrap);
    setTimeout(() => wrap.remove(), 700);
  });

  // BACKGROUND CANVAS — floating particles + aurora
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const particles = Array.from({length: 60}, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 2 + 0.5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    a: Math.random() * 0.5 + 0.1,
  }));

  let t = 0;
  function drawBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Aurora
    const grad1 = ctx.createRadialGradient(canvas.width*0.5, -canvas.height*0.1, 0, canvas.width*0.5, -canvas.height*0.1, canvas.height*0.8);
    grad1.addColorStop(0, `rgba(60,180,60,${0.12 + Math.sin(t*0.5)*0.04})`);
    grad1.addColorStop(1, 'transparent');
    ctx.fillStyle = grad1;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Moving aurora streaks
    for (let i = 0; i < 3; i++) {
      const x = canvas.width * (0.2 + i * 0.3 + Math.sin(t * 0.2 + i) * 0.05);
      const g = ctx.createRadialGradient(x, canvas.height * 0.1, 0, x, canvas.height * 0.5, canvas.height * 0.6);
      g.addColorStop(0, `rgba(80,200,70,${0.04 + Math.sin(t * 0.3 + i) * 0.02})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Particles
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(100,220,80,${p.a * (0.5 + Math.sin(t + p.x) * 0.3)})`;
      ctx.fill();
    });

    t += 0.01;
    requestAnimationFrame(drawBg);
  }
  drawBg();

  // TYPING ANIMATION
  const bioEl = document.getElementById('bio');
  const texts = [
    'i make gorilla video lolz',
    'just vibing fr',
    'not locked in whatsoever',
    'next video neverrrrrrrr',
    'e',
  ];
  let ti = 0, ci = 0, deleting = false;
  function type() {
    const text = texts[ti];
    if (!deleting) {
      ci++;
      bioEl.innerHTML = text.slice(0, ci) + '<span class="type-cursor"></span>';
      if (ci === text.length) {
        deleting = true;
        setTimeout(type, 2000);
        return;
      }
    } else {
      ci--;
      bioEl.innerHTML = text.slice(0, ci) + '<span class="type-cursor"></span>';
      if (ci === 0) {
        deleting = false;
        ti = (ti + 1) % texts.length;
      }
    }
    setTimeout(type, deleting ? 40 : 70);
  }
  setTimeout(type, 800);

  // AVATAR EASTER EGG
  let eggClicks = 0;
  const egg = document.getElementById('egg-popup');
  document.getElementById('avatar').addEventListener('click', e => {
    e.stopPropagation();
    const av = document.getElementById('avatar');
    av.classList.remove('avatar-spin');
    void av.offsetWidth;
    av.classList.add('avatar-spin');
    av.addEventListener('animationend', () => av.classList.remove('avatar-spin'), {once:true});
    eggClicks++;
    if (eggClicks >= 3) {
      eggClicks = 0;
      egg.classList.add('show');
      setTimeout(() => egg.classList.remove('show'), 2500);
    }
  });
  egg.addEventListener('click', () => egg.classList.remove('show'));

  // DISCORD COPY
  document.getElementById('dc-btn').addEventListener('click', e => {
    e.preventDefault();
    navigator.clipboard.writeText('fishstickyt').then(() => showToast('copied fishstickyt ✓'));
  });

  // TOAST
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // MUSIC PLAYER
  const audio = document.getElementById('bg-audio');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const pauseIcon = document.getElementById('pause-icon');
  const barsEl = document.getElementById('bars');
  const volSlider = document.getElementById('vol');
  let playing = false;

  audio.volume = 0.5;

  playBtn.addEventListener('click', () => {
    if (!playing) {
      audio.play().then(() => {
        playing = true;
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
        barsEl.classList.add('playing');
      }).catch(() => showToast('click anywhere first to enable audio'));
    } else {
      audio.pause();
      playing = false;
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      barsEl.classList.remove('playing');
    }
  });

  volSlider.addEventListener('input', () => {
    audio.volume = volSlider.value;
  });

  // Cursor hover states
  document.querySelectorAll('a, button, input, .music-btn, .avatar-container').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1.8)';
      ring.style.borderColor = 'rgba(100,220,80,0.8)';
      ring.style.width = '48px';
      ring.style.height = '48px';
    });
    el.addEventListener('mouseleave', () => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      ring.style.borderColor = 'rgba(100,220,80,0.5)';
      ring.style.width = '36px';
      ring.style.height = '36px';
    });
  });
</script>
</body>
</html>
